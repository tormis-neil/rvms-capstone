name: Build Driver App APK

# Builds the RVMS driver mobile app into a shareable debug APK.
# Download it from the run's "Artifacts" section (rvms-driver-debug-apk)
# and share/install it directly on Android 8.0+ devices for team testing.

on:
  push:
    branches:
      - claude/dreamy-albattani-u8g12m
    paths:
      - "mobile/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rvms-driver-debug-apk
          path: mobile/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
