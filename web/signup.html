<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVMS - Create Account</title>
    <link rel="icon" type="image/svg+xml" href="assets/rvms-logo.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            padding: 2rem 1rem;
        }
        .auth-card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 460px;
        }
        .auth-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 1rem;
        }
        .auth-logo .logo-text {
            font-size: 1.1rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25rem rgba(27, 47, 114, 0.25);
        }
        .input-group-text {
            background-color: var(--bg);
            color: var(--text-secondary);
        }
        .btn-navy {
            background-color: var(--primary);
            color: white;
            font-weight: 600;
        }
        .btn-navy:hover {
            background-color: var(--primary-dark);
            color: white;
        }
        .text-navy {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Logo -->
            <img src="assets/rvms-logo.svg" alt="RVMS" width="72" height="72" class="d-block mx-auto mb-3">

            <!-- Title -->
            <h4 class="text-center text-navy fw-bold mb-1">Create Account</h4>
            <p class="text-center text-secondary small mb-4">Register an agency admin account</p>

            <!-- Form -->
            <form action="dashboard.html" method="GET" id="signupForm">
                <div class="mb-3">
                    <label for="fullName" class="form-label text-secondary small fw-semibold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control py-2" id="fullName" placeholder="e.g. Juan A. Santos" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label text-secondary small fw-semibold">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control py-2" id="email" placeholder="admin@agency.gov.ph" required>
                    </div>
                    <div class="form-text">Use your official agency email address.</div>
                </div>

                <div class="mb-3">
                    <label for="agency" class="form-label text-secondary small fw-semibold">Agency</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-building"></i></span>
                        <select class="form-select py-2" id="agency" required>
                            <option value="" disabled selected>Select an agency...</option>
                            <option value="BFP">BFP (Bureau of Fire Protection)</option>
                            <option value="PNP">PNP (Philippine National Police)</option>
                            <option value="CDRRMO">CDRRMO (City Disaster Risk Reduction and Management Office)</option>
                            <option value="CHO">CHO (City Health Office)</option>
                        </select>
                    </div>
                    <div class="form-text">Your account will only access this agency's records.</div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label text-secondary small fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control py-2" id="password" placeholder="Create a password" minlength="8" required>
                        <button type="button" class="btn btn-light border" id="togglePassword" tabindex="-1" aria-label="Show password">
                            <i class="bi bi-eye" id="togglePasswordIcon"></i>
                        </button>
                    </div>
                    <div class="form-text">At least 8 characters.</div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label text-secondary small fw-semibold">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control py-2" id="confirmPassword" placeholder="Re-enter your password" required>
                    </div>
                    <div class="invalid-feedback d-block d-none" id="confirmError">Passwords do not match.</div>
                </div>

                <button type="submit" class="btn btn-navy w-100 py-2 mb-4">Sign Up</button>

                <div class="text-center text-secondary small">
                    Already have an account?
                    <a href="login.html" class="text-navy fw-bold text-decoration-none">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const confirmError = document.getElementById('confirmError');
        const toggleBtn = document.getElementById('togglePassword');
        const toggleIcon = document.getElementById('togglePasswordIcon');

        toggleBtn.addEventListener('click', () => {
            const hidden = passwordInput.type === 'password';
            passwordInput.type = hidden ? 'text' : 'password';
            toggleIcon.className = hidden ? 'bi bi-eye-slash' : 'bi bi-eye';
        });

        function validateMatch() {
            const mismatch = confirmInput.value !== '' && confirmInput.value !== passwordInput.value;
            confirmInput.classList.toggle('is-invalid', mismatch);
            confirmError.classList.toggle('d-none', !mismatch);
            return !mismatch;
        }
        confirmInput.addEventListener('input', validateMatch);
        passwordInput.addEventListener('input', validateMatch);

        document.getElementById('signupForm').addEventListener('submit', event => {
            if (!validateMatch() || confirmInput.value === '') {
                event.preventDefault();
                confirmInput.classList.add('is-invalid');
                confirmError.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
