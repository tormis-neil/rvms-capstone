<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVMS - Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            padding: 2rem 0;
        }
        .auth-card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 450px;
        }
        .auth-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 1rem;
        }
        .auth-logo .logo-text {
            font-size: 1.1rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25rem rgba(27, 47, 114, 0.25);
        }
        .btn-navy {
            background-color: var(--primary);
            color: white;
            font-weight: 600;
        }
        .btn-navy:hover {
            background-color: var(--primary-dark);
            color: white;
        }
        .text-navy {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Logo -->
            <div class="logo-circle auth-logo">
                <h1 class="logo-text m-0 text-center">RVMS</h1>
            </div>
            
            <!-- Title -->
            <h4 class="text-center text-navy fw-bold mb-4">Create Account</h4>
            
            <!-- Form -->
            <form action="dashboard.html" method="GET">
                <div class="mb-3">
                    <label for="fullName" class="form-label text-secondary small fw-semibold">Full Name</label>
                    <input type="text" class="form-control py-2" id="fullName" required>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label text-secondary small fw-semibold">Email</label>
                    <input type="email" class="form-control py-2" id="email" required>
                </div>

                <div class="mb-3">
                    <label for="agency" class="form-label text-secondary small fw-semibold">Agency</label>
                    <select class="form-select py-2" id="agency" required>
                        <option value="" disabled selected>Select an agency...</option>
                        <option value="BFP">BFP (Bureau of Fire Protection)</option>
                        <option value="PNP">PNP (Philippine National Police)</option>
                        <option value="CDRRMO">CDRRMO</option>
                        <option value="CHO">CHO (City Health Office)</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label text-secondary small fw-semibold">Password</label>
                    <input type="password" class="form-control py-2" id="password" required>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label text-secondary small fw-semibold">Confirm Password</label>
                    <input type="password" class="form-control py-2" id="confirmPassword" required>
                </div>
                
                <button type="submit" class="btn btn-navy w-100 py-2 mb-4">Sign Up</button>
                
                <div class="text-center text-secondary small">
                    Already have an account? 
                    <a href="login.html" class="text-navy fw-bold text-decoration-none">Sign In</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
